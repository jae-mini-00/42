services:
  mariadb:
    build: ./requirements/mariadb
    image: mariadb:inception
    restart: always
    networks:
      - inception
    volumes:
      - wordpress_db:/var/lib/mysql
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - DB_PASSWORD_FILE=/run/secrets/db_password
      - DB_ROOT_PASSWORD_FILE=/run/secrets/db_root_password
    secrets:
      - db_password
      - db_root_password

  wordpress:
    build: ./requirements/wordpress
    image: wordpress:inception
    restart: always
    depends_on:
      - mariadb
    networks:
      - inception
    volumes:
      - wordpress_site:/var/www/html
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - DB_HOST=${DB_HOST}
      - DB_PASSWORD_FILE=/run/secrets/db_password
      - WP_TITLE=${WP_TITLE}
      - WP_ADMIN_USER=${WP_ADMIN_USER}
      - WP_ADMIN_EMAIL=${WP_ADMIN_EMAIL}
      - WP_ADMIN_PASSWORD_FILE=/run/secrets/wp_admin_password
      - WP_USER=${WP_USER}
      - WP_USER_EMAIL=${WP_USER_EMAIL}
      - WP_USER_PASSWORD_FILE=/run/secrets/wp_user_password
    secrets:
      - db_password
      - wp_admin_password
      - wp_user_password

  nginx:
    build: ./requirements/nginx
    image: nginx:inception
    restart: always
    depends_on:
      - wordpress
    networks:
      - inception
    ports:
      - "443:443"
    volumes:
      - wordpress_site:/var/www/html:ro
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME}

networks:
  inception:
    driver: bridge

volumes:
  wordpress_db:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${WORDPRESS_DB_DATA_PATH}
  wordpress_site:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${WORDPRESS_SITE_DATA_PATH}

secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt
  wp_admin_password:
    file: ../secrets/wp_admin_password.txt
  wp_user_password:
    file: ../secrets/wp_user_password.txt