<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webserv 로그인</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at 18% 20%, rgba(255,255,255,0.05), transparent 20%),
                radial-gradient(circle at 82% 22%, rgba(218, 188, 140, 0.05), transparent 20%),
                radial-gradient(circle at 50% 82%, rgba(128, 178, 221, 0.05), transparent 24%),
                radial-gradient(circle at center, rgba(255,255,255,0.02), transparent 34%),
                linear-gradient(135deg, #0d1117 0%, #010409 42%, #0d1117 100%);
            color: #e6edf3;
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 28px;
            position: relative;
            overflow: hidden;
        }

        .ambient {
            position: fixed;
            border-radius: 50%;
            filter: blur(110px);
            pointer-events: none;
            z-index: 0;
        }

        .ambient-1 { width: 420px; height: 420px; left: 6%; top: 10%; background: rgba(255,255,255,0.1); opacity: 0.2; }
        .ambient-2 { width: 420px; height: 420px; right: 6%; top: 14%; background: rgba(210, 182, 140, 0.1); opacity: 0.15; }
        .ambient-3 { width: 460px; height: 460px; left: 50%; bottom: -40px; transform: translateX(-50%); background: rgba(145, 187, 224, 0.1); opacity: 0.15; }

        .noise {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            opacity: 0.02;
            background-image:
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 3px 3px, 3px 3px;
        }

        .login-box {
            position: relative;
            z-index: 3;
            background: rgba(30, 35, 40, 0.4);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px 32px;
            width: 100%;
            max-width: 380px;
            box-shadow:
                0 24px 64px rgba(0, 0, 0, 0.4),
                0 0 40px rgba(0, 0, 0, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .login-box::before {
            content: "";
            position: absolute;
            top: 0;
            left: 10%;
            width: 80%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        }

        .login-box h2 {
            text-align: center;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 28px;
            letter-spacing: -0.5px;
            color: #f0f6fc;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #a8b2bd;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #e6edf3;
            font-size: 15px;
            outline: none;
            transition: all 0.2s ease;
        }

        .input-group input:focus {
            border-color: #58a6ff;
            background: rgba(0, 0, 0, 0.3);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.2);
        }

        .input-group input::placeholder {
            color: #6e7681;
        }

        button[type="submit"] {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            background: linear-gradient(135deg, #1f6feb, #388bfd);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(31, 111, 235, 0.3);
        }

        button[type="submit"]:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(31, 111, 235, 0.4);
            background: linear-gradient(135deg, #388bfd, #1f6feb);
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            text-decoration: none;
            color: #8b949e;
            font-size: 14px;
            margin-bottom: 24px;
            transition: color 0.2s ease;
        }

        .back-btn:hover {
            color: #e6edf3;
        }

        .back-btn svg {
            width: 16px;
            height: 16px;
        }
    </style>
</head>
<body>

    <div class="ambient ambient-1"></div>
    <div class="ambient ambient-2"></div>
    <div class="ambient ambient-3"></div>
    <div class="noise"></div>

    <div class="login-box">
        <a href="/" class="back-btn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
            돌아가기
        </a>

        <h2>로그인</h2>
        <!-- 
          action: 폼 데이터를 전송할 서버의 경로
          method: 중요 데이터이므로 반드시 POST 사용
        -->
        <form action="/login" method="POST">
            <div class="input-group">
                <label for="id">아이디 (ID)</label>
                <!-- name="id" 속성이 서버에서 받는 Key가 됩니다. (id=입력값) -->
                <input type="text" id="id" name="id" required placeholder="아이디를 입력하세요">
            </div>
            
            <div class="input-group">
                <label for="pw">비밀번호 (Password)</label>
                <!-- name="pw" 속성이 서버에서 받는 Key가 됩니다. (pw=입력값) -->
                <input type="password" id="pw" name="pw" required placeholder="비밀번호를 입력하세요">
            </div>
            
            <button type="submit">서버 로그인</button>
        </form>
    </div>

</body>
</html>
