<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>redirect test page</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at 18% 20%, rgba(255,255,255,0.05), transparent 20%),
                radial-gradient(circle at 82% 22%, rgba(218, 188, 140, 0.05), transparent 20%),
                radial-gradient(circle at 50% 82%, rgba(128, 178, 221, 0.05), transparent 24%),
                radial-gradient(circle at center, rgba(255,255,255,0.02), transparent 34%),
                linear-gradient(135deg, #0d1117 0%, #010409 42%, #0d1117 100%);
            color: #e6edf3;
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 28px;
            position: relative;
            overflow: hidden;
        }

        .ambient {
            position: fixed;
            border-radius: 50%;
            filter: blur(110px);
            pointer-events: none;
            z-index: 0;
        }

        .ambient-1 { width: 420px; height: 420px; left: 6%; top: 10%; background: rgba(255,255,255,0.1); opacity: 0.2; }
        .ambient-2 { width: 420px; height: 420px; right: 6%; top: 14%; background: rgba(210, 182, 140, 0.1); opacity: 0.15; }
        .ambient-3 { width: 460px; height: 460px; left: 50%; bottom: -40px; transform: translateX(-50%); background: rgba(145, 187, 224, 0.1); opacity: 0.15; }

        .noise {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            opacity: 0.02;
            background-image:
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 3px 3px, 3px 3px;
        }

        .container {
            position: relative;
            z-index: 3;
            background: rgba(30, 35, 40, 0.4);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 48px 34px 42px;
            width: 100%;
            max-width: 680px;
            box-shadow:
                0 24px 64px rgba(0, 0, 0, 0.4),
                0 0 40px rgba(0, 0, 0, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            text-align: center;
        }

        .container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 10%;
            width: 80%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        }

        .badge {
            display: inline-block;
            margin-bottom: 18px;
            padding: 7px 14px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 999px;
            font-size: 12px;
            font-weight: bold;
            color: #79c0ff;
            background: rgba(121, 192, 255, 0.08);
            letter-spacing: 0.7px;
        }

        .redirect {
            font-size: clamp(72px, 12vw, 140px);
            line-height: 1;
            font-weight: bold;
            letter-spacing: -4px;
            color: #e6edf3;
            margin-bottom: 16px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-shadow: 0 0 40px rgba(255,255,255,0.1);
        }

        h1 {
            font-size: clamp(24px, 4vw, 32px);
            line-height: 1.2;
            margin-bottom: 18px;
            color: #f0f6fc;
            font-weight: 600;
        }

        .subtext {
            color: #8b949e;
            font-size: 16px;
            line-height: 1.6;
            max-width: 480px;
            margin: 0 auto 36px;
        }

        .action-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 200px;
            padding: 14px 24px;
            text-decoration: none;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(255,255,255,0.12), rgba(255,255,255,0.06));
            border: 1px solid rgba(255,255,255,0.15);
            color: #e6edf3;
            font-size: 15px;
            font-weight: bold;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, rgba(255,255,255,0.15), rgba(255,255,255,0.08));
            border-color: rgba(255,255,255,0.3);
            box-shadow: 0 12px 24px rgba(0,0,0,0.3);
        }

        @media (max-width: 720px) {
            .container { padding: 36px 24px 30px; }
            .redirect { margin-bottom: 12px; }
            h1 { font-size: 24px; }
            .subtext { font-size: 14px; margin-bottom: 28px; }
            .action-btn { width: 100%; min-width: 0; }
        }
    </style>
</head>
<body>
    <div class="ambient ambient-1"></div>
    <div class="ambient ambient-2"></div>
    <div class="ambient ambient-3"></div>
    <div class="noise"></div>

    <main class="container">
        <div class="badge">301 Moved permanently</div>

        <div class="redirect">301</div>
        <h1>Moved permanently</h1>

        <p class="subtext">
            old stuff.
            if you are seeing this, redirection failed.
        </p>

        <a href="/" class="action-btn">메인 페이지로 이동</a>
    </main>
</body>
</html>
