<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Timeout Visualization</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .info-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            border-left: 4px solid #667eea;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .info-label {
            color: #666;
            font-weight: 500;
        }

        .info-value {
            color: #333;
            font-weight: 600;
            font-family: 'Courier New', monospace;
        }

        .session-id {
            word-break: break-all;
            font-size: 12px;
            margin-top: 10px;
            padding: 10px;
            background: white;
            border-radius: 5px;
            color: #999;
        }

        .timeout-section {
            margin: 30px 0;
        }

        .timeout-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .progress-bar {
            width: 100%;
            height: 30px;
            background: #e9ecef;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            border: 2px solid #667eea;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 12px;
        }

        .timeout-timer {
            text-align: center;
            margin-top: 20px;
        }

        .timer-display {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
            font-family: 'Courier New', monospace;
            margin-bottom: 10px;
        }

        .timer-label {
            font-size: 14px;
            color: #666;
        }

        .warning {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(255, 0, 0, 0.1);
            border-radius: 10px;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .warning.show {
            display: flex;
        }

        .warning-text {
            color: #d32f2f;
            font-weight: bold;
            font-size: 12px;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 30px 0;
        }

        .stat-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border-top: 3px solid #667eea;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
            font-family: 'Courier New', monospace;
        }

        .stat-label {
            font-size: 12px;
            color: #999;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-refresh {
            background: #667eea;
            color: white;
        }

        .btn-refresh:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-logout {
            background: #f0f0f0;
            color: #d32f2f;
        }

        .btn-logout:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
        }

        .status {
            text-align: center;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 500;
        }

        .status.active {
            background: #c8e6c9;
            color: #2e7d32;
            border-left: 4px solid #2e7d32;
        }

        .status.warning {
            background: #ffe0b2;
            color: #e65100;
            border-left: 4px solid #e65100;
        }

        .status.danger {
            background: #ffcdd2;
            color: #c62828;
            border-left: 4px solid #c62828;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Session Timeout Monitor</h1>
        <p class="subtitle">Real-time session activity tracking</p>

        <div class="status active" id="status">
            ✓ Session Active
        </div>

        <div class="info-box">
            <div class="info-row">
                <span class="info-label">Session ID:</span>
                <span class="info-value" id="sessionId">No session</span>
            </div>
            <div class="info-row">
                <span class="info-label">Logged In:</span>
                <span class="info-value" id="loginTime">--:--:--</span>
            </div>
            <div class="info-row">
                <span class="info-label">Time Elapsed:</span>
                <span class="info-value" id="elapsed">0s</span>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="percentRemaining">100%</div>
                <div class="stat-label">Time Remaining</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="secondsRemaining">30</div>
                <div class="stat-label">Seconds</div>
            </div>
        </div>

        <div class="timeout-section">
            <div class="timeout-label">Session Timeout Progress</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 100%;"></div>
                <div class="warning" id="warning">
                    <span class="warning-text">SESSION EXPIRING</span>
                </div>
            </div>
        </div>

        <div class="timeout-timer">
            <div class="timer-display" id="timerDisplay">00:30</div>
            <div class="timer-label" id="timerLabel">Time until session expires</div>
        </div>

        <div class="button-group">
            <button class="btn-refresh" onclick="location.reload()">↻ Refresh Page</button>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>
    </div>

    <script>
        const TIMEOUT_SECONDS = 300;  // 5 minutes
        let loginTime = null;

        function initSession() {
            // Check for session_id in cookies
            const cookies = document.cookie.split(';');
            let sessionId = 'No session';

            for (let cookie of cookies) {
                const [name, value] = cookie.trim().split('=');
                if (name === 'session_id') {
                    sessionId = value;
                    break;
                }
            }

            document.getElementById('sessionId').textContent = sessionId;

            // Initialize login time from localStorage if exists, otherwise use now
            if (!localStorage.getItem('loginTime')) {
                loginTime = Date.now();
                localStorage.setItem('loginTime', loginTime);
            } else {
                loginTime = parseInt(localStorage.getItem('loginTime'));
            }

            updateDisplay();
            setInterval(updateDisplay, 100); // Update 10 times per second for smooth animation
        }

        function updateDisplay() {
            const now = Date.now();
            const elapsedMs = now - loginTime;
            const elapsedSeconds = Math.floor(elapsedMs / 1000);
            const remainingSeconds = Math.max(0, TIMEOUT_SECONDS - elapsedSeconds);
            const percentRemaining = Math.max(0, (remainingSeconds / TIMEOUT_SECONDS) * 100);

            // Update login time display
            const loginDate = new Date(loginTime);
            document.getElementById('loginTime').textContent =
                loginDate.toLocaleTimeString('en-US', {
                    hour12: false,
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });

            // Update elapsed time
            const minutes = Math.floor(elapsedSeconds / 60);
            const seconds = elapsedSeconds % 60;
            document.getElementById('elapsed').textContent =
                minutes > 0 ? `${minutes}m ${seconds}s` : `${seconds}s`;

            // Update remaining time
            document.getElementById('secondsRemaining').textContent = remainingSeconds;
            document.getElementById('percentRemaining').textContent = Math.round(percentRemaining) + '%';

            // Update timer display (MM:SS format)
            const minutes_rem = Math.floor(remainingSeconds / 60);
            const seconds_rem = remainingSeconds % 60;
            document.getElementById('timerDisplay').textContent =
                String(minutes_rem).padStart(2, '0') + ':' + String(seconds_rem).padStart(2, '0');

            // Update progress bar
            const progressFill = document.getElementById('progressFill');
            progressFill.style.width = percentRemaining + '%';

            // Update progress text
            if (percentRemaining > 20) {
                progressFill.textContent = Math.round(percentRemaining) + '%';
                progressFill.style.color = 'white';
            } else {
                progressFill.textContent = '⚠️ Expiring!';
                progressFill.style.color = '#d32f2f';
            }

            // Update status and styling
            const status = document.getElementById('status');
            const warning = document.getElementById('warning');

            if (remainingSeconds <= 0) {
                status.textContent = '⚠️ Session Expired';
                status.className = 'status danger';
                document.getElementById('timerLabel').textContent = 'Session has expired! Please refresh to continue.';
                warning.classList.add('show');
                progressFill.style.background = 'linear-gradient(90deg, #d32f2f 0%, #b71c1c 100%)';
            } else if (remainingSeconds <= 5) {
                status.textContent = '⚠️ Session Expiring Soon';
                status.className = 'status danger';
                warning.classList.add('show');
                progressFill.style.background = 'linear-gradient(90deg, #d32f2f 0%, #ff6f00 100%)';
            } else if (remainingSeconds <= 10) {
                status.textContent = '⚠️ Session Expiring';
                status.className = 'status warning';
                warning.classList.remove('show');
                progressFill.style.background = 'linear-gradient(90deg, #ff6f00 0%, #ffa726 100%)';
            } else {
                status.textContent = '✓ Session Active';
                status.className = 'status active';
                warning.classList.remove('show');
                progressFill.style.background = 'linear-gradient(90deg, #667eea 0%, #764ba2 100%)';
            }
        }

        function logout() {
            // Clear session from localStorage
            localStorage.removeItem('loginTime');

            // Try to access a logout endpoint or just redirect
            alert('Session cleared. You have been logged out.');
            window.location.href = '/';
        }

        // Initialize on page load
        window.addEventListener('load', initSession);
    </script>
</body>
</html>
