<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Info</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
            text-align: center;
        }

        .session-info {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 8px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .info-label {
            font-weight: 600;
            color: #555;
        }

        .info-value {
            color: #333;
            font-family: 'Courier New', monospace;
        }

        .status {
            text-align: center;
            padding: 15px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .status.active {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.inactive {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-refresh {
            background: #667eea;
            color: white;
        }

        .btn-refresh:hover {
            background: #5568d3;
        }

        .btn-home {
            background: #e9ecef;
            color: #333;
        }

        .btn-home:hover {
            background: #dee2e6;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            border: 1px solid #f5c6cb;
            text-align: center;
        }

        .loading {
            text-align: center;
            color: #666;
            font-size: 14px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Session Information</h1>

        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>Loading session information...</p>
        </div>

        <div id="content" style="display: none;">
            <div id="errorMessage"></div>

            <div class="status active" id="status">
                ✓ Logged In
            </div>

            <div class="session-info">
                <div class="info-row">
                    <span class="info-label">User ID:</span>
                    <span class="info-value" id="userId">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Logged In At:</span>
                    <span class="info-value" id="loginTime">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Session Timeout:</span>
                    <span class="info-value" id="timeout">-</span>
                </div>
            </div>

            <div class="button-group">
                <button class="btn-refresh" onclick="refreshData()">Refresh</button>
                <button class="btn-home" onclick="window.location.href='/'">Back to Home</button>
            </div>
        </div>
    </div>

    <script>
        async function fetchSessionInfo() {
            try {
                const response = await fetch('/api/session-info');
                const data = await response.json();

                if (!data.logged_in) {
                    showError('Not logged in. Please log in first.');
                    return;
                }

                displaySession(data);
            } catch (error) {
                showError('Error: ' + error.message);
            }
        }

        function displaySession(data) {
            showContent();

            document.getElementById('userId').textContent = data.user_id || 'Unknown';

            const createdTime = new Date();
            createdTime.setSeconds(createdTime.getSeconds() - data.elapsed_seconds);
            document.getElementById('loginTime').textContent = createdTime.toLocaleString();

            const timeoutMinutes = Math.floor(data.timeout_seconds / 60);
            document.getElementById('timeout').textContent = timeoutMinutes + ' minutes';
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.className = 'error-message';
            document.getElementById('status').className = 'status inactive';
            document.getElementById('status').textContent = '✗ Not Logged In';
            showContent();
        }

        function showContent() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'block';
        }

        function refreshData() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('content').style.display = 'none';
            setTimeout(fetchSessionInfo, 500);
        }

        window.addEventListener('load', fetchSessionInfo);
    </script>
</body>
</html>
